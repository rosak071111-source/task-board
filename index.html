<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AIタスクボード</title>
<style>
  :root{--bg:#07090f;--panel:#0d1220;--card:#121a2e;--ink:#d7e2ff;--sub:#5f6f94;--line:#1d2a4a;
    --neon:#00e5ff;--magenta:#ff2ec4;--todo:#00a3ff;--doing:#ffb020;--review:#a78bfa;--done:#00e58f;--blocked:#ff3860;}
  *{box-sizing:border-box;margin:0}
  body{font-family:"Hiragino Sans","Noto Sans JP",sans-serif;background:var(--bg);color:var(--ink);
    background-image:linear-gradient(rgba(0,229,255,.04) 1px,transparent 1px),linear-gradient(90deg,rgba(0,229,255,.04) 1px,transparent 1px);
    background-size:32px 32px}
  header{display:flex;align-items:center;gap:12px;padding:12px 20px;background:rgba(13,18,32,.92);backdrop-filter:blur(6px);
    border-bottom:1px solid var(--line);position:sticky;top:0;z-index:5;box-shadow:0 0 24px rgba(0,229,255,.08)}
  header h1{font-size:16px;letter-spacing:.14em;text-transform:uppercase;
    background:linear-gradient(90deg,var(--neon),var(--magenta));-webkit-background-clip:text;background-clip:text;color:transparent}
  header .meta{font-size:11px;color:var(--sub);margin-right:auto;font-family:ui-monospace,monospace}
  .tabs button{border:none;background:none;padding:8px 14px;font-size:13px;cursor:pointer;color:var(--sub);
    border-bottom:2px solid transparent;letter-spacing:.08em}
  .tabs button.active{border-color:var(--neon);color:var(--neon);text-shadow:0 0 12px rgba(0,229,255,.6)}
  .btn{border:1px solid var(--line);background:var(--panel);color:var(--ink);border-radius:6px;padding:7px 14px;font-size:13px;cursor:pointer;transition:.2s}
  .btn:hover{border-color:var(--neon);box-shadow:0 0 10px rgba(0,229,255,.25)}
  .btn.primary{background:linear-gradient(135deg,#0077ff,var(--neon));color:#03121a;border:none;font-weight:700}
  .btn.primary:hover{box-shadow:0 0 16px rgba(0,229,255,.55)}
  #board{display:flex;gap:14px;padding:18px 20px;overflow-x:auto;align-items:flex-start;min-height:calc(100vh - 60px)}
  .col{background:rgba(13,18,32,.85);border:1px solid var(--line);border-radius:12px;min-width:255px;width:255px;padding:10px;flex-shrink:0}
  .col h2{font-size:12px;color:var(--sub);padding:2px 6px 10px;display:flex;justify-content:space-between;
    letter-spacing:.12em;text-transform:uppercase}
  .col h2 span{color:var(--neon);font-family:ui-monospace,monospace}
  .col.dragover{outline:1px solid var(--neon);box-shadow:0 0 18px rgba(0,229,255,.35) inset}
  .card{background:var(--card);border:1px solid var(--line);border-radius:9px;padding:10px 12px;margin-bottom:9px;
    cursor:grab;font-size:13px;transition:.15s;position:relative}
  .card:hover{border-color:var(--neon);box-shadow:0 0 14px rgba(0,229,255,.22);transform:translateY(-1px)}
  .card .title{font-weight:600;margin-bottom:7px;word-break:break-all;line-height:1.45}
  .card .badges{display:flex;gap:5px;flex-wrap:wrap}
  .tag{font-size:10px;padding:1px 8px;border-radius:3px;background:#0a1020;color:var(--sub);
    border:1px solid var(--line);font-family:ui-monospace,monospace;letter-spacing:.04em}
  .tag.P0{color:var(--blocked);border-color:var(--blocked);text-shadow:0 0 8px rgba(255,56,96,.6)}
  .tag.P1{color:var(--doing);border-color:var(--doing)}
  .tag.cloud{color:var(--neon);border-color:var(--neon)} .tag.local{color:var(--done);border-color:var(--done)}
  .tag.human{color:var(--magenta);border-color:var(--magenta)}
  .card .reason{font-size:11px;color:var(--blocked);margin-top:6px}
  .card.pending{opacity:.5;border-style:dashed;cursor:default}
  .bar{height:3px;border-radius:9px 9px 0 0;margin:-10px -12px 9px;box-shadow:0 0 8px currentColor}
  dialog{border:1px solid var(--line);border-radius:12px;padding:22px;width:430px;max-width:92vw;
    background:var(--panel);color:var(--ink);box-shadow:0 0 40px rgba(0,229,255,.18)}
  dialog::backdrop{background:rgba(3,5,10,.7);backdrop-filter:blur(3px)}
  dialog h3{margin-bottom:14px;font-size:14px;letter-spacing:.1em;color:var(--neon)}
  dialog label{display:block;font-size:12px;color:var(--sub);margin:10px 0 4px}
  dialog input,dialog select,dialog textarea{width:100%;padding:8px;border:1px solid var(--line);border-radius:6px;
    font-size:13px;font-family:inherit;background:#0a1020;color:var(--ink)}
  dialog input:focus,dialog select:focus,dialog textarea:focus{outline:none;border-color:var(--neon);box-shadow:0 0 8px rgba(0,229,255,.3)}
  dialog .row{display:flex;gap:10px} dialog .row>div{flex:1}
  dialog footer{display:flex;justify-content:flex-end;gap:8px;margin-top:18px}
  #toast{position:fixed;bottom:20px;left:50%;transform:translateX(-50%);background:#0a1020;color:var(--neon);
    border:1px solid var(--neon);padding:10px 18px;border-radius:8px;font-size:13px;opacity:0;transition:.3s;
    pointer-events:none;box-shadow:0 0 18px rgba(0,229,255,.35)}
  #toast.show{opacity:1}
  .hint{font-size:11px;color:var(--sub);margin-top:6px}
</style>
</head>
<body>
<header>
  <h1>▲ AI TASK BOARD</h1>
  <div class="tabs">
    <button id="tabTasks" class="active" onclick="switchTab('tasks')">タスク</button>
    <button id="tabArticles" onclick="switchTab('articles')">記事</button>
  </div>
  <span class="meta" id="meta"></span>
  <button class="btn" onclick="openSettings()">⚙ 設定</button>
  <button class="btn primary" onclick="openAdd()">＋ タスク追加</button>
</header>
<div id="board"></div>

<dialog id="dlgAdd">
  <h3>タスクを追加</h3>
  <label>タイトル</label><input id="fTitle" placeholder="例: ◯◯の調査">
  <div class="row">
    <div><label>担当</label><select id="fAssignee"><option value="cloud">cloud (Claude)</option><option value="local">local (Hermes)</option><option value="human">human (自分)</option></select></div>
    <div><label>優先度</label><select id="fPriority"><option>P2</option><option>P0</option><option>P1</option><option>P3</option></select></div>
  </div>
  <label>依頼内容(完了条件も書くと精度が上がる)</label><textarea id="fDesc" rows="4"></textarea>
  <footer><button class="btn" onclick="dlgAdd.close()">キャンセル</button><button class="btn primary" onclick="submitAdd()">追加</button></footer>
</dialog>

<dialog id="dlgTask" style="width:720px;max-width:96vw">
  <h3 id="tskTitle" style="word-break:break-all"></h3>
  <div id="tskMeta" class="hint" style="margin-bottom:10px"></div>
  <div id="tskBody" style="max-height:38vh;overflow-y:auto;font-size:13px;line-height:1.7;
    border:1px solid var(--line);border-radius:8px;padding:14px;background:#0a1020"></div>
  <div class="row" style="margin-top:12px">
    <div><label>状態(差し戻しは todo へ)</label><select id="tskStatus"><option>todo</option><option>doing</option><option>review</option><option>blocked</option><option>done</option></select></div>
    <div><label>担当</label><select id="tskAssignee"><option>cloud</option><option>local</option><option>human</option></select></div>
    <div><label>優先度</label><select id="tskPriority"><option>P0</option><option>P1</option><option>P2</option><option>P3</option></select></div>
  </div>
  <label>コメント(ログに [human] として追記。差し戻し時は指示を書く)</label>
  <textarea id="tskComment" rows="3" placeholder="例: 方向性が違う。◯◯の観点でやり直して"></textarea>
  <footer>
    <button class="btn" onclick="dlgTask.close()">閉じる</button>
    <button class="btn primary" onclick="submitTaskUpdate()">保存</button>
  </footer>
</dialog>

<dialog id="dlgArticle" style="width:720px;max-width:96vw">
  <h3 id="artTitle" style="word-break:break-all"></h3>
  <div id="artMeta" class="hint" style="margin-bottom:10px"></div>
  <div id="artBody" style="max-height:55vh;overflow-y:auto;font-size:13px;line-height:1.75;
    border:1px solid var(--line);border-radius:8px;padding:14px;background:#0a1020"></div>
  <div id="artReview" style="display:none;margin-top:14px">
    <div class="row">
      <div><label>差し戻し先</label><select id="fReturnStage"><option>校正</option><option>裏取り</option><option>下書き</option><option>素案</option></select></div>
      <div style="flex:2"><label>差し戻し理由(差し戻し時は必須)</label><input id="fReturnReason" placeholder="例: 3章の主張の出典が弱い"></div>
    </div>
  </div>
  <footer>
    <button class="btn" onclick="dlgArticle.close()">閉じる</button>
    <span id="artActions" style="display:none">
      <button class="btn" onclick="reviewArticle('return')">↩ 差し戻し</button>
      <button class="btn primary" onclick="reviewArticle('approve')">✅ 承認して完了</button>
    </span>
  </footer>
</dialog>

<dialog id="dlgSettings">
  <h3>設定</h3>
  <label>GitHub Personal Access Token (fine-grained / task-board と Vaultリポジトリの Contents: Read and write)</label>
  <input id="fToken" type="password" placeholder="github_pat_...">
  <div class="row">
    <div><label>board owner</label><input id="fOwner"></div>
    <div><label>board repo</label><input id="fRepo"></div>
  </div>
  <div class="row">
    <div><label>vault owner(記事本文の取得元)</label><input id="fVaultOwner" placeholder="同じowner"></div>
    <div><label>vault repo(プライベート)</label><input id="fVaultRepo" placeholder="obsidian-vault"></div>
  </div>
  <p class="hint">トークンはこのブラウザのlocalStorageにのみ保存されます。操作は inbox/ に変更リクエストとして書き込まれ、Mac側の同期バッチ(30分毎)がVaultに反映します。記事本文はvaultリポジトリからPAT認証で取得され、公開ページには含まれません。</p>
  <footer><button class="btn" onclick="dlgSettings.close()">閉じる</button><button class="btn primary" onclick="saveSettings()">保存</button></footer>
</dialog>
<div id="toast"></div>

<script>
const TASK_COLS = [["todo","未着手","--todo"],["doing","作業中","--doing"],["review","レビュー待ち","--review"],["blocked","停滞","--blocked"],["done","完了","--done"]];
const STAGE_COLS = ["素案","下書き","裏取り","校正","レビュー","完了"];
let DATA = null, TAB = 'tasks', PENDING = [];

function guessRepo(){
  const o = localStorage.getItem('gh_owner') || location.hostname.split('.')[0];
  const seg = location.pathname.split('/').filter(Boolean);
  const r = localStorage.getItem('gh_repo') || seg[0] || '';
  return {owner:o, repo:r};
}
const $ = id => document.getElementById(id);
function toast(m){ $('toast').textContent=m; $('toast').classList.add('show'); setTimeout(()=>$('toast').classList.remove('show'),2600); }

async function load(){
  try{
    const res = await fetch('board.json?ts='+Date.now());
    DATA = await res.json();
    $('meta').textContent = '更新: ' + (DATA.generated_at||'').replace('T',' ').slice(0,16) + (PENDING.length?` / 反映待ち ${PENDING.length}件`:'');
    render();
  }catch(e){ toast('board.json を読み込めません: '+e.message); }
}

function card(t, isTask){
  const div = document.createElement('div');
  div.className = 'card' + (t._pending?' pending':'');
  const colVar = isTask ? (TASK_COLS.find(c=>c[0]===t.status)||[])[2] : null;
  div.innerHTML = (colVar?`<div class="bar" style="background:var(${colVar})"></div>`:'') +
    `<div class="title">${esc(t.title)}</div>
     <div class="badges">
       ${t.assignee?`<span class="tag ${esc(t.assignee)}">${esc(t.assignee)}</span>`:''}
       ${t.priority?`<span class="tag ${esc(t.priority)}">${esc(t.priority)}</span>`:''}
       ${isTask&&t.id?`<span class="tag">${esc(t.id)}</span>`:''}
       ${t.updated?`<span class="tag">${esc(t.updated)}</span>`:''}
     </div>` +
    (t.blocked_reason?`<div class="reason">⛔ ${esc(t.blocked_reason)}</div>`:'') +
    (t._pending?`<div class="reason" style="color:var(--sub)">⏳ 同期待ち</div>`:'');
  if(isTask && !t._pending){
    div.draggable = true;
    div.addEventListener('dragstart', e=>{ DRAGGING=true; e.dataTransfer.setData('text/plain', t.id); });
    div.addEventListener('dragend', ()=>setTimeout(()=>DRAGGING=false, 80));
    div.style.cursor = 'pointer';
    div.addEventListener('click', ()=>{ if(!DRAGGING) openTask(t); });
  }
  if(!isTask && !t._pending){
    div.style.cursor = 'pointer';
    div.addEventListener('click', ()=>openArticle(t));
  }
  return div;
}
function esc(s){ return String(s??'').replace(/[&<>"']/g, c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c])); }

function render(){
  const board = $('board'); board.innerHTML='';
  if(TAB==='tasks'){
    for(const [key,label] of TASK_COLS.map(c=>[c[0],c[1]])){
      const col = document.createElement('div'); col.className='col'; col.dataset.status=key;
      const items = (DATA.tasks||[]).filter(t=>t.status===key)
        .concat(PENDING.filter(p=>p.to===key||(p.type==='create'&&key==='todo')).map(p=>({title:p.title||('移動: '+p.id),assignee:p.assignee,priority:p.priority,_pending:true})));
      col.innerHTML = `<h2>${label}<span>${items.length}</span></h2>`;
      items.forEach(t=>col.appendChild(card(t,true)));
      col.addEventListener('dragover', e=>{e.preventDefault();col.classList.add('dragover');});
      col.addEventListener('dragleave', ()=>col.classList.remove('dragover'));
      col.addEventListener('drop', e=>{e.preventDefault();col.classList.remove('dragover');moveTask(e.dataTransfer.getData('text/plain'), key);});
      board.appendChild(col);
    }
  } else {
    for(const stage of STAGE_COLS){
      const col = document.createElement('div'); col.className='col';
      const items = (DATA.articles||[]).filter(a=>a.status===stage);
      col.innerHTML = `<h2>${stage}<span>${items.length}</span></h2>`;
      items.forEach(a=>col.appendChild(card(a,false)));
      board.appendChild(col);
    }
  }
}
function switchTab(t){ TAB=t; $('tabTasks').classList.toggle('active',t==='tasks'); $('tabArticles').classList.toggle('active',t==='articles'); render(); }

async function ghWrite(path, obj, msg){
  const token = localStorage.getItem('gh_token');
  if(!token){ toast('先に⚙設定でトークンを保存してください'); openSettings(); throw new Error('no token'); }
  const {owner, repo} = guessRepo();
  const body = { message: msg, content: btoa(unescape(encodeURIComponent(JSON.stringify(obj,null,2)))) };
  const res = await fetch(`https://api.github.com/repos/${owner}/${repo}/contents/${path}`, {
    method:'PUT', headers:{Authorization:'Bearer '+token, Accept:'application/vnd.github+json'}, body:JSON.stringify(body)});
  if(!res.ok) throw new Error('GitHub API '+res.status);
}

function openAdd(){ $('dlgAdd').showModal(); }
function openSettings(){
  const {owner,repo}=guessRepo(); $('fOwner').value=owner; $('fRepo').value=repo;
  $('fToken').value = localStorage.getItem('gh_token')||'';
  $('fVaultOwner').value = localStorage.getItem('vault_owner')||'';
  $('fVaultRepo').value = localStorage.getItem('vault_repo')||'';
  $('dlgSettings').showModal();
}
function saveSettings(){
  localStorage.setItem('gh_token', $('fToken').value.trim());
  localStorage.setItem('gh_owner', $('fOwner').value.trim());
  localStorage.setItem('gh_repo', $('fRepo').value.trim());
  localStorage.setItem('vault_owner', $('fVaultOwner').value.trim());
  localStorage.setItem('vault_repo', $('fVaultRepo').value.trim());
  $('dlgSettings').close(); toast('保存しました');
}

// ---- タスク詳細・編集 ----
let CUR_TASK = null, DRAGGING = false;
async function openTask(t){
  CUR_TASK = t;
  $('tskTitle').textContent = `${t.id} ${t.title}`;
  $('tskMeta').textContent = `状態: ${t.status} / 担当: ${t.assignee||'-'} / ${t.priority||'-'} / 更新: ${t.updated||'-'}`;
  $('tskStatus').value = t.status || 'todo';
  $('tskAssignee').value = t.assignee || 'cloud';
  $('tskPriority').value = t.priority || 'P2';
  $('tskComment').value = '';
  $('tskBody').innerHTML = '<span class="hint">読み込み中…</span>';
  $('dlgTask').showModal();
  const token = localStorage.getItem('gh_token');
  const vo = localStorage.getItem('vault_owner')||guessRepo().owner;
  const vr = localStorage.getItem('vault_repo');
  if(!token || !vr){ $('tskBody').innerHTML = '<span class="hint">本文表示には ⚙設定 で PAT と vault repo の設定が必要です(編集・コメントは設定なしでも不可)。</span>'; return; }
  try{
    const path = '_agent_hub/' + (t.file||('tasks/'+t.id+'.md')).split('/').map(encodeURIComponent).join('/');
    const res = await fetch(`https://api.github.com/repos/${vo}/${vr}/contents/${path}`,
      {headers:{Authorization:'Bearer '+token, Accept:'application/vnd.github.raw+json'}});
    if(!res.ok) throw new Error('GitHub API '+res.status);
    $('tskBody').innerHTML = miniMd(await res.text());
  }catch(e){ $('tskBody').innerHTML = `<span class="hint">取得失敗: ${esc(e.message)}</span>`; }
}
async function submitTaskUpdate(){
  const t = CUR_TASK; if(!t) return;
  const set = {};
  if($('tskStatus').value !== t.status) set.status = $('tskStatus').value;
  if($('tskAssignee').value !== (t.assignee||'')) set.assignee = $('tskAssignee').value;
  if($('tskPriority').value !== (t.priority||'')) set.priority = $('tskPriority').value;
  const comment = $('tskComment').value.trim();
  if(!Object.keys(set).length && !comment){ toast('変更がありません'); return; }
  if(set.status && ['todo','doing'].includes(set.status) && t.status!=='todo' && !comment){
    toast('差し戻し時はコメントで指示を書いてください'); return;
  }
  const req = {type:'task_update', id:t.id, file:t.file, set, comment,
    requested_at:new Date().toISOString(), requester:'human(board)'};
  try{
    await ghWrite(`inbox/update-${t.id}-${Date.now()}.json`, req, `board: update ${t.id}`);
    Object.assign(t, set); $('dlgTask').close();
    toast('更新リクエストを送信しました(次回同期で反映)'); render();
  }catch(e){ toast('送信失敗: '+e.message); }
}

// ---- 記事ビューア & レビュー ----
let CUR_ARTICLE = null;
function miniMd(src){
  let t = esc(src);
  t = t.replace(/^---\n[\s\S]*?\n---\n/, '');                       // frontmatter除去
  t = t.replace(/^###### (.*)$/gm,'<h6>$1</h6>').replace(/^##### (.*)$/gm,'<h5>$1</h5>')
       .replace(/^#### (.*)$/gm,'<h4>$1</h4>').replace(/^### (.*)$/gm,'<h3 style="margin:14px 0 6px;color:var(--neon)">$1</h3>')
       .replace(/^## (.*)$/gm,'<h2 style="margin:18px 0 8px;border-bottom:1px solid var(--line);padding-bottom:4px">$1</h2>')
       .replace(/^# (.*)$/gm,'<h1 style="margin:18px 0 8px;font-size:18px">$1</h1>');
  t = t.replace(/\*\*([^*]+)\*\*/g,'<b>$1</b>');
  t = t.replace(/(https?:\/\/[^\s)&<]+)/g,'<a href="$1" target="_blank" style="color:var(--neon)">$1</a>');
  t = t.replace(/^- (.*)$/gm,'<div style="padding-left:1em">・$1</div>');
  t = t.replace(/\n\n+/g,'<br><br>').replace(/\n/g,'<br>');
  return t;
}
async function openArticle(a){
  CUR_ARTICLE = a;
  $('artTitle').textContent = a.title;
  $('artMeta').textContent = `工程: ${a.status} / 担当: ${a.assignee||'-'} / 更新: ${a.updated||'-'} / ${a.file}`;
  const isReview = a.status === 'レビュー';
  $('artReview').style.display = isReview ? 'block' : 'none';
  $('artActions').style.display = isReview ? 'inline' : 'none';
  $('artBody').innerHTML = '<span class="hint">読み込み中…</span>';
  $('dlgArticle').showModal();
  const token = localStorage.getItem('gh_token');
  const vo = localStorage.getItem('vault_owner')||guessRepo().owner;
  const vr = localStorage.getItem('vault_repo');
  if(!token || !vr){
    $('artBody').innerHTML = '<span class="hint">本文を表示するには ⚙設定 で PAT と vault repo を設定してください(GitHub Mobileアプリで直接開く方法もあります)。</span>';
    return;
  }
  try{
    const res = await fetch(`https://api.github.com/repos/${vo}/${vr}/contents/articles/${encodeURIComponent(a.file)}`,
      {headers:{Authorization:'Bearer '+token, Accept:'application/vnd.github.raw+json'}});
    if(!res.ok) throw new Error('GitHub API '+res.status);
    $('artBody').innerHTML = miniMd(await res.text());
  }catch(e){ $('artBody').innerHTML = `<span class="hint">取得失敗: ${esc(e.message)}(vault repoへのpush・PAT権限を確認)</span>`; }
}
async function reviewArticle(action){
  const a = CUR_ARTICLE; if(!a) return;
  const reason = $('fReturnReason').value.trim();
  if(action==='return' && !reason){ toast('差し戻し理由を入力してください'); return; }
  const req = {type:'article_review', file:a.file, action,
    to_stage: action==='approve' ? '完了' : $('fReturnStage').value,
    reason, requested_at:new Date().toISOString(), requester:'human(board)'};
  try{
    await ghWrite(`inbox/review-${Date.now()}.json`, req, `board: ${action} ${a.file}`);
    a.status = req.to_stage; $('dlgArticle').close(); $('fReturnReason').value='';
    toast(action==='approve' ? '承認しました(次回同期で確定)' : `${req.to_stage}へ差し戻しました(次回同期で確定)`);
    render();
  }catch(e){ toast('送信失敗: '+e.message); }
}
async function submitAdd(){
  const req = {type:'create', title:$('fTitle').value.trim(), assignee:$('fAssignee').value,
    priority:$('fPriority').value, description:$('fDesc').value.trim(),
    requester:'human(board)', requested_at:new Date().toISOString()};
  if(!req.title){ toast('タイトルは必須です'); return; }
  try{
    await ghWrite(`inbox/create-${Date.now()}.json`, req, `board: create ${req.title}`);
    PENDING.push(req); $('dlgAdd').close(); $('fTitle').value=''; $('fDesc').value='';
    toast('追加リクエストを送信しました(次回同期で反映)'); render();
  }catch(e){ toast('送信失敗: '+e.message); }
}
async function moveTask(id, to){
  const t = (DATA.tasks||[]).find(x=>x.id===id);
  if(!t || t.status===to) return;
  const req = {type:'move', id, from:t.status, to, requested_at:new Date().toISOString(), requester:'human(board)'};
  try{
    await ghWrite(`inbox/move-${id}-${Date.now()}.json`, req, `board: move ${id} -> ${to}`);
    t.status = to; toast(`${id} を移動しました(次回同期で確定)`); render();
  }catch(e){ toast('移動失敗: '+e.message); }
}
load(); setInterval(load, 120000);
</script>
